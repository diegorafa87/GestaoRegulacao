{% extends 'base.html' %}
{% block title %}Novo Paciente{% endblock %}
{% block content %}
<div class="text-center mb-4 pb-3 border-bottom border-2">
    <div class="text-primary fw-bold text-uppercase small mb-1">Secretaria Municipal de Saúde de Fernando Pedroza</div>
    <h2 class="mb-1 fw-bold text-primary">Novo Paciente</h2>
    <div class="text-muted small">Cadastro de novo paciente no sistema de regulação</div>
</div>
<form method="post" class="row g-3">
    <div class="col-md-3">
        <label class="form-label">CPF:</label>
        <input name="cpf" class="form-control" maxlength="14" placeholder="000.000.000-00">
    </div>
    <div class="col-md-3">
        <label class="form-label">Cartão SUS:</label>
        <input name="sus" class="form-control" maxlength="18" placeholder="000 0000 0000 0000">
    </div>
    <div class="col-md-6">
        <label class="form-label">Nome:</label>
        <input name="nome" class="form-control" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Nascimento (DD/MM/AAAA):</label>
        <input id="nascimento" name="nascimento" class="form-control" required placeholder="DD/MM/AAAA" maxlength="10">
    </div>
    <div class="col-md-4">
        <label class="form-label">Telefone:</label>
        <input id="telefone" name="telefone" class="form-control" placeholder="(00) 00000-00000" maxlength="15">
    </div>
    <div class="col-md-6">
        <label class="form-label">Rua:</label>
        <input id="rua" name="rua" class="form-control" autocomplete="off" list="sugestoes-rua" placeholder="Ex: Rua das Flores">
        <datalist id="sugestoes-rua"></datalist>
    </div>
    <div class="col-md-2">
        <label class="form-label">Número:</label>
        <input id="numero" name="numero" class="form-control" autocomplete="off" inputmode="numeric" placeholder="Ex: 123">
    </div>
    <div class="col-md-4">
        <label class="form-label">Bairro:</label>
        <input id="bairro" name="bairro" class="form-control" autocomplete="off" list="sugestoes-bairro" placeholder="Ex: Centro">
        <datalist id="sugestoes-bairro"></datalist>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="/pacientes" class="btn btn-secondary">Voltar</a>
    </div>
</form>

<script>
(() => {
    const campoBirthdate = document.getElementById('nascimento');
    const campoTelefone = document.getElementById('telefone');
    const formPaciente = document.querySelector('form[method="post"]');
    const campoRua = document.getElementById('rua');
    const campoNumero = document.getElementById('numero');
    const campoBairro = document.getElementById('bairro');
    const listaRuas = document.getElementById('sugestoes-rua');
    const listaBairros = document.getElementById('sugestoes-bairro');

    const STORAGE_ATUAL = 'novoPacienteEnderecoAtual';
    const STORAGE_HIST = 'novoPacienteEnderecoHistorico';

    const parseJsonSeguro = (raw, fallback) => {
        try {
            return JSON.parse(raw);
        } catch (_) {
            return fallback;
        }
    };

    const popularDatalist = (elemento, valores) => {
        if (!elemento) return;
        elemento.innerHTML = '';
        valores.forEach((valor) => {
            const opcao = document.createElement('option');
            opcao.value = valor;
            elemento.appendChild(opcao);
        });
    };

    const normalizarTexto = (valor) => (valor || '').trim();

    const lerHistorico = () =>
        parseJsonSeguro(localStorage.getItem(STORAGE_HIST), { ruas: [], bairros: [] });

    const carregarSugestoes = () => {
        const historico = lerHistorico();
        popularDatalist(listaRuas,   Array.isArray(historico.ruas)   ? historico.ruas   : []);
        popularDatalist(listaBairros, Array.isArray(historico.bairros) ? historico.bairros : []);
    };

    // Salva um valor no histórico imediatamente ao sair do campo
    const salvarValorNoHistorico = (chave, valor) => {
        valor = normalizarTexto(valor);
        if (!valor) return;

        const historico = lerHistorico();
        const lista = Array.isArray(historico[chave]) ? historico[chave] : [];

        // Normaliza para comparação sem diferença de maiúsculas
        const jaExiste = lista.some(v => v.toLowerCase() === valor.toLowerCase());
        if (!jaExiste) {
            lista.unshift(valor);
            historico[chave] = lista.slice(0, 30);
            localStorage.setItem(STORAGE_HIST, JSON.stringify(historico));
        }

        // Atualiza o datalist imediatamente
        carregarSugestoes();
    };

    carregarSugestoes();

    // Salva ao sair do campo (blur) — captura cada digitação única
    if (campoRua) {
        campoRua.addEventListener('blur', () => salvarValorNoHistorico('ruas', campoRua.value));
    }
    if (campoBairro) {
        campoBairro.addEventListener('blur', () => salvarValorNoHistorico('bairros', campoBairro.value));
    }

    if (campoBirthdate) {
        campoBirthdate.addEventListener('input', (e) => {
            let valor = e.target.value.replace(/\D/g, '');
            
            if (valor.length > 8) {
                valor = valor.slice(0, 8);
            }

            let formatado = '';
            for (let i = 0; i < valor.length; i++) {
                if (i === 2 || i === 4) {
                    formatado += '/';
                }
                formatado += valor[i];
            }

            e.target.value = formatado;
        });

        campoBirthdate.addEventListener('keydown', (e) => {
            const valor = e.target.value.replace(/\D/g, '');
            
            if (e.key === 'Backspace' && e.target.value.endsWith('/')) {
                e.target.value = e.target.value.slice(0, -1);
            }
        });
    }

    // Máscara de telefone (00) 00000-00000
    if (campoTelefone) {
        campoTelefone.addEventListener('input', (e) => {
            let valor = e.target.value.replace(/\D/g, '');
            
            if (valor.length > 12) {
                valor = valor.slice(0, 12);
            }

            let formatado = '';
            if (valor.length > 0) {
                formatado = '(' + valor.slice(0, 2);
            }
            if (valor.length > 2) {
                formatado += ') ' + valor.slice(2, 7);
            }
            if (valor.length > 7) {
                formatado += '-' + valor.slice(7, 12);
            }

            e.target.value = formatado;
        });

        campoTelefone.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && (e.target.value.endsWith(' ') || e.target.value.endsWith('-'))) {
                e.target.value = e.target.value.slice(0, -1);
            }
        });
    }
})();
</script>
{% endblock %}
