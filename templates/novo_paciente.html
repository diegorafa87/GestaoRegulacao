{% extends 'base.html' %}
{% block title %}Novo Paciente{% endblock %}
{% block content %}
<div class="text-center mb-4 pb-3 border-bottom border-2">
    <div class="text-primary fw-bold text-uppercase small mb-1">Secretaria Municipal de Saúde de Fernando Pedroza</div>
    <h2 class="mb-1 fw-bold text-primary">Novo Paciente</h2>
    <div class="text-muted small">Cadastro de novo paciente no sistema de regulação</div>
</div>
<form method="post" class="row g-3" id="formNovoPaciente">
    <div class="col-md-3">
        <label class="form-label">CPF:</label>
        <input id="cpf" name="cpf" class="form-control" maxlength="14" placeholder="000.000.000-00" value="{{ form_data.cpf if form_data else '' }}">
    </div>
    <div class="col-md-3">
        <label class="form-label">Cartão SUS:</label>
        <input id="sus" name="sus" class="form-control" maxlength="18" placeholder="000 0000 0000 0000" value="{{ form_data.sus if form_data else '' }}">
    </div>
    <div class="col-12 d-none" id="avisoDuplicidadePaciente"></div>
    <div class="col-md-6">
        <label class="form-label">Nome:</label>
        <input name="nome" class="form-control" required value="{{ form_data.nome if form_data else '' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Nascimento (DD/MM/AAAA):</label>
        <input id="nascimento" name="nascimento" class="form-control" required placeholder="DD/MM/AAAA" maxlength="10" value="{{ form_data.nascimento if form_data else '' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Telefone:</label>
        <input id="telefone" name="telefone" class="form-control" placeholder="(00) 00000-00000" maxlength="15" value="{{ form_data.telefone if form_data else '' }}">
    </div>
    <div class="col-md-6">
        <label class="form-label">Rua:</label>
        <input id="rua" name="rua" class="form-control" autocomplete="off" list="sugestoes-rua" placeholder="Ex: Rua das Flores" value="{{ form_data.rua if form_data else '' }}">
        <datalist id="sugestoes-rua"></datalist>
    </div>
    <div class="col-md-2">
        <label class="form-label">Número:</label>
        <input id="numero" name="numero" class="form-control" autocomplete="off" inputmode="numeric" placeholder="Ex: 123" value="{{ form_data.numero if form_data else '' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Bairro:</label>
        <input id="bairro" name="bairro" class="form-control" autocomplete="off" list="sugestoes-bairro" placeholder="Ex: Centro" value="{{ form_data.bairro if form_data else '' }}">
        <datalist id="sugestoes-bairro"></datalist>
    </div>
    <div class="col-12">
        <button type="submit" class="btn btn-success" id="btnSalvarPaciente">Salvar</button>
        <a href="/pacientes" class="btn btn-secondary">Voltar</a>
    </div>
</form>

<script>
(() => {
    const campoBirthdate = document.getElementById('nascimento');
    const campoTelefone = document.getElementById('telefone');
    const campoCpf = document.getElementById('cpf');
    const campoSus = document.getElementById('sus');
    const campoRua = document.getElementById('rua');
    const campoBairro = document.getElementById('bairro');
    const listaRuas = document.getElementById('sugestoes-rua');
    const listaBairros = document.getElementById('sugestoes-bairro');
    const avisoDuplicidade = document.getElementById('avisoDuplicidadePaciente');
    const formNovoPaciente = document.getElementById('formNovoPaciente');
    const btnSalvar = document.getElementById('btnSalvarPaciente');

    let timerDuplicidade;

    function somenteDigitos(valor) {
        return (valor || '').replace(/\D/g, '');
    }

    function aplicarMascaraCpf(valor) {
        const digitos = somenteDigitos(valor).slice(0, 11);
        let formatado = '';

        for (let i = 0; i < digitos.length; i++) {
            if (i === 3 || i === 6) formatado += '.';
            if (i === 9) formatado += '-';
            formatado += digitos[i];
        }

        return formatado;
    }

    function limparAvisoDuplicidade() {
        if (!avisoDuplicidade) return;
        avisoDuplicidade.className = 'col-12 d-none';
        avisoDuplicidade.innerHTML = '';
        if (btnSalvar) btnSalvar.disabled = false;
    }

    function mostrarAvisoDuplicidade(texto) {
        if (!avisoDuplicidade) return;
        avisoDuplicidade.className = 'col-12 alert alert-danger mb-0';
        avisoDuplicidade.innerHTML = texto;
        if (btnSalvar) btnSalvar.disabled = true;
    }

    async function verificarDuplicidadePaciente() {
        const cpf = somenteDigitos(campoCpf ? campoCpf.value : '');
        const sus = somenteDigitos(campoSus ? campoSus.value : '');

        if (!cpf && !sus) {
            limparAvisoDuplicidade();
            return;
        }

        try {
            const resposta = await fetch(`/api/verificar_paciente_existente?cpf=${encodeURIComponent(cpf)}&sus=${encodeURIComponent(sus)}`);
            if (!resposta.ok) {
                limparAvisoDuplicidade();
                return;
            }

            const dados = await resposta.json();
            if (!dados.existe) {
                limparAvisoDuplicidade();
                return;
            }

            mostrarAvisoDuplicidade(`
                <strong>Paciente já cadastrado!</strong><br>
                ID: <strong>${dados.id}</strong> - ${dados.nome}.<br>
                Não é permitido duplicar pacientes.
            `);
        } catch (_) {
            limparAvisoDuplicidade();
        }
    }

    function configurarVerificacaoDuplicidadeEmTempoReal() {
        if (!campoCpf || !campoSus) return;

        const handler = () => {
            clearTimeout(timerDuplicidade);
            timerDuplicidade = setTimeout(verificarDuplicidadePaciente, 250);
        };

        campoCpf.addEventListener('input', handler);
        campoSus.addEventListener('input', handler);

        if (formNovoPaciente) {
            formNovoPaciente.addEventListener('submit', async (event) => {
                await verificarDuplicidadePaciente();
                if (btnSalvar && btnSalvar.disabled) {
                    event.preventDefault();
                }
            });
        }
    }

    configurarVerificacaoDuplicidadeEmTempoReal();

    if (campoCpf) {
        campoCpf.addEventListener('input', (e) => {
            e.target.value = aplicarMascaraCpf(e.target.value);
        });
    }

    // --- Autocomplete via API (igual ao campo Especialidade) ---
    function configurarAutocompleteEndereco(campo, lista, tipoCampo) {
        if (!campo || !lista) return;
        let timer;
        campo.addEventListener('input', () => {
            const termo = campo.value.trim();
            clearTimeout(timer);
            timer = setTimeout(async () => {
                if (termo.length < 1) {
                    lista.innerHTML = '';
                    return;
                }
                try {
                    const resp = await fetch(`/api/sugestoes_endereco?campo=${encodeURIComponent(tipoCampo)}&termo=${encodeURIComponent(termo)}`);
                    if (!resp.ok) return;
                    const itens = await resp.json();
                    lista.innerHTML = '';
                    itens.forEach((item) => {
                        const option = document.createElement('option');
                        option.value = item;
                        lista.appendChild(option);
                    });
                } catch (_) {
                    // falha silenciosa para não atrapalhar digitação
                }
            }, 220);
        });
    }

    configurarAutocompleteEndereco(campoRua, listaRuas, 'rua');
    configurarAutocompleteEndereco(campoBairro, listaBairros, 'bairro');

    // --- Máscara de nascimento ---
    if (campoBirthdate) {
        campoBirthdate.addEventListener('input', (e) => {
            let valor = e.target.value.replace(/\D/g, '');
            if (valor.length > 8) valor = valor.slice(0, 8);
            let formatado = '';
            for (let i = 0; i < valor.length; i++) {
                if (i === 2 || i === 4) formatado += '/';
                formatado += valor[i];
            }
            e.target.value = formatado;
        });
        campoBirthdate.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value.endsWith('/')) {
                e.target.value = e.target.value.slice(0, -1);
            }
        });
    }

    // --- Máscara de telefone ---
    if (campoTelefone) {
        campoTelefone.addEventListener('input', (e) => {
            let valor = e.target.value.replace(/\D/g, '');
            if (valor.length > 12) valor = valor.slice(0, 12);
            let formatado = '';
            if (valor.length > 0) formatado = '(' + valor.slice(0, 2);
            if (valor.length > 2) formatado += ') ' + valor.slice(2, 7);
            if (valor.length > 7) formatado += '-' + valor.slice(7, 12);
            e.target.value = formatado;
        });
        campoTelefone.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && (e.target.value.endsWith(' ') || e.target.value.endsWith('-'))) {
                e.target.value = e.target.value.slice(0, -1);
            }
        });
    }
})();
</script>
{% endblock %}
